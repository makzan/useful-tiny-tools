<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f7f7f7" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#222222" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Zen Clock" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icons/zen-clock-icon.svg" />
  <title>Zen Clock</title>
  <style>
    :root {
      --bg: #f7f7f7;
      --bg-soft: #fcfcfc;
      --bg-deep: #f3f3f3;
      --ink: #222;
      --muted: #666;
      --countdown-block-bg: rgba(253, 253, 253, 0.9);
      --countdown-block-border: rgba(34, 34, 34, 0.06);
      --countdown-block-shadow: rgba(34, 34, 34, 0.05);
      --countdown-input-bg: rgba(255, 255, 255, 0.96);
      --countdown-input-border: rgba(34, 34, 34, 0.11);
      --countdown-input-border-focus: rgba(34, 34, 34, 0.26);
      --countdown-display-hover: rgba(34, 34, 34, 0.035);
      --countdown-link: rgba(34, 34, 34, 0.52);
      --countdown-link-hover: rgba(34, 34, 34, 0.84);
      --countdown-action-bg: rgba(34, 34, 34, 0.08);
      --countdown-action-bg-hover: rgba(34, 34, 34, 0.12);
      --countdown-action-primary-bg: #222;
      --countdown-action-primary-ink: #f5f5f5;
      --countdown-danger: #a94141;
      --countdown-danger-bg: rgba(169, 65, 65, 0.12);
      --grain: rgba(255, 255, 255, 0.14);
      --btn-border: rgba(34, 34, 34, 0.16);
      --btn-bg: rgba(255, 255, 255, 0.52);
      --btn-bg-hover: rgba(255, 255, 255, 0.78);
      --btn-border-hover: rgba(34, 34, 34, 0.3);
      --time-shadow: rgba(34, 34, 34, 0.06);
      --font-ui: "Avenir Next", "SF Pro Text", "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      --font-time: "Avenir Next", "SF Pro Display", "Helvetica Neue", "Segoe UI", "Noto Sans TC", sans-serif;
      --left-gap: clamp(1.2rem, 8vw, 8rem);
      --time-size: clamp(3rem, 11vw, 8.6rem);
      color-scheme: light dark;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        /* Swap foreground/background for dark mode */
        --bg: #222;
        --bg-soft: #2f2f2f;
        --bg-deep: #171717;
        --ink: #efefef;
        --muted: #c2c2c2;
        --countdown-block-bg: rgba(255, 255, 255, 0.07);
        --countdown-block-border: rgba(239, 239, 239, 0.16);
        --countdown-block-shadow: rgba(0, 0, 0, 0.36);
        --countdown-input-bg: rgba(34, 34, 34, 0.65);
        --countdown-input-border: rgba(239, 239, 239, 0.24);
        --countdown-input-border-focus: rgba(239, 239, 239, 0.46);
        --countdown-display-hover: rgba(239, 239, 239, 0.08);
        --countdown-link: rgba(239, 239, 239, 0.56);
        --countdown-link-hover: rgba(239, 239, 239, 0.9);
        --countdown-action-bg: rgba(239, 239, 239, 0.12);
        --countdown-action-bg-hover: rgba(239, 239, 239, 0.2);
        --countdown-action-primary-bg: #efefef;
        --countdown-action-primary-ink: #222;
        --countdown-danger: #ff9b9b;
        --countdown-danger-bg: rgba(255, 155, 155, 0.17);
        --grain: rgba(255, 255, 255, 0.08);
        --btn-border: rgba(239, 239, 239, 0.28);
        --btn-bg: rgba(34, 34, 34, 0.6);
        --btn-bg-hover: rgba(34, 34, 34, 0.85);
        --btn-border-hover: rgba(239, 239, 239, 0.44);
        --time-shadow: rgba(0, 0, 0, 0.42);
      }
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      background:
        radial-gradient(circle at 20% 20%, var(--bg-soft) 0%, var(--bg) 48%, var(--bg-deep) 100%);
      color: var(--ink);
      font-family: var(--font-ui);
      font-weight: 450;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: auto;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(
          120deg,
          var(--grain) 0 2px,
          transparent 2px 16px
        );
      opacity: 0.2;
      pointer-events: none;
    }

    .action-bar {
      position: fixed;
      top: clamp(0.75rem, 1.8vw, 1.2rem);
      right: clamp(0.75rem, 1.8vw, 1.2rem);
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .fullscreen-btn {
      appearance: none;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: var(--ink);
      font-family: var(--font-ui);
      font-weight: 560;
      border-radius: 999px;
      padding: 0.5rem 0.9rem;
      font-size: clamp(0.72rem, 1.2vw, 0.86rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 180ms ease, border-color 180ms ease, opacity 180ms ease;
      backdrop-filter: blur(4px);
    }

    .fullscreen-btn:hover,
    .fullscreen-btn:focus-visible {
      background: var(--btn-bg-hover);
      border-color: var(--btn-border-hover);
      outline: none;
    }

    .fullscreen-btn:active {
      opacity: 0.72;
    }

    body.is-fullscreen .fullscreen-btn {
      opacity: 0.45;
    }

    .clock-shell {
      position: relative;
      top: clamp(-1.3rem, -4vh, -0.45rem);
      display: flex;
      flex-direction: column;
      gap: clamp(2.4rem, 7vh, 5.6rem);
      margin-left: var(--left-gap);
      width: min(92vw, 960px);
      animation: settle-in 680ms cubic-bezier(0.19, 1, 0.22, 1) both;
    }

    .label {
      font-size: clamp(0.74rem, 1.2vw, 0.95rem);
      letter-spacing: 0.18em;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.85;
      margin-bottom: clamp(0.45rem, 1.6vw, 0.9rem);
    }

    .time {
      margin: 0;
      font-size: var(--time-size);
      line-height: 0.92;
      letter-spacing: -1px;
      font-family: var(--font-time);
      font-weight: 800;
      font-variation-settings: "wght" 800;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1, "lnum" 1;
      text-wrap: nowrap;
      transition: opacity 160ms ease;
      text-shadow: 0 12px 30px var(--time-shadow);
    }

    .time.tick {
      opacity: 0.82;
    }

    .meta {
      margin-top: clamp(0.6rem, 1.8vw, 1.1rem);
      font-size: clamp(0.85rem, 1.3vw, 1.04rem);
      letter-spacing: 0.03em;
      font-weight: 520;
      color: var(--muted);
      opacity: 0.88;
    }

    .countdown-area {
      max-width: min(82vw, 680px);
    }

    .countdown-open-link {
      appearance: none;
      border: 0;
      background: transparent;
      margin: 0;
      padding: 0;
      color: var(--countdown-link);
      font-family: var(--font-ui);
      font-size: clamp(0.72rem, 1.05vw, 0.84rem);
      letter-spacing: 0.09em;
      text-transform: uppercase;
      font-weight: 560;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 0.18em;
      cursor: pointer;
      transition: color 160ms ease, opacity 160ms ease;
    }

    .countdown-open-link:hover,
    .countdown-open-link:focus-visible {
      color: var(--countdown-link-hover);
      outline: none;
    }

    .countdown-open-link:active {
      opacity: 0.7;
    }

    .countdown-block {
      background: var(--countdown-block-bg);
      border: 1px solid var(--countdown-block-border);
      border-radius: clamp(1rem, 2.8vw, 1.4rem);
      padding: clamp(0.95rem, 2.7vw, 1.45rem);
      box-shadow: 0 20px 50px -36px var(--countdown-block-shadow);
      backdrop-filter: blur(4px);
      transition: border-color 160ms ease, box-shadow 180ms ease;
    }

    .countdown-block.is-editing {
      border-color: var(--countdown-input-border-focus);
      box-shadow: 0 20px 56px -34px var(--countdown-block-shadow);
    }

    .countdown-label {
      margin-bottom: clamp(0.6rem, 1.8vw, 0.9rem);
      font-size: clamp(0.66rem, 1vw, 0.8rem);
      letter-spacing: 0.2em;
      font-weight: 620;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.84;
    }

    .countdown-display {
      border-radius: 0.82rem;
      margin: 0 -0.42rem;
      padding: 0.22rem 0.42rem 0.38rem;
      cursor: pointer;
      transition: background 160ms ease, opacity 160ms ease;
    }

    .countdown-display:hover,
    .countdown-display:focus-visible {
      background: var(--countdown-display-hover);
      outline: none;
    }

    .countdown-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: clamp(0.7rem, 2vw, 1.15rem);
      margin-top: clamp(0.75rem, 2.1vw, 1rem);
      padding-top: clamp(0.72rem, 2vw, 0.95rem);
      border-top: 1px dashed var(--countdown-block-border);
    }

    .countdown-field {
      display: flex;
      flex-direction: column;
      gap: 0.38rem;
      min-width: min(100%, 14rem);
      flex: 1 1 14rem;
    }

    .countdown-field-time {
      flex: 0 1 10rem;
      min-width: 8.8rem;
    }

    .countdown-field-label {
      font-size: 0.78rem;
      letter-spacing: 0.11em;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.84;
    }

    .countdown-field input {
      appearance: none;
      border: 1px solid var(--countdown-input-border);
      border-radius: 0.74rem;
      background: var(--countdown-input-bg);
      color: var(--ink);
      font-family: var(--font-ui);
      font-size: 0.98rem;
      font-weight: 520;
      padding: 0.62rem 0.76rem;
      transition: border-color 160ms ease, background 160ms ease;
    }

    .countdown-field input::placeholder {
      color: var(--muted);
      opacity: 0.62;
    }

    .countdown-field input:focus-visible {
      outline: none;
      border-color: var(--countdown-input-border-focus);
    }

    .countdown-actions {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0.58rem;
      flex: 1 1 100%;
    }

    .countdown-action-btn {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 0.42rem 0.86rem;
      font-family: var(--font-ui);
      font-size: 0.78rem;
      font-weight: 620;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink);
      background: var(--countdown-action-bg);
      cursor: pointer;
      transition: background 150ms ease, opacity 150ms ease;
    }

    .countdown-action-btn:hover,
    .countdown-action-btn:focus-visible {
      background: var(--countdown-action-bg-hover);
      outline: none;
    }

    .countdown-action-btn:active {
      opacity: 0.76;
    }

    .countdown-action-btn.primary {
      background: var(--countdown-action-primary-bg);
      color: var(--countdown-action-primary-ink);
    }

    .countdown-action-btn.primary:hover,
    .countdown-action-btn.primary:focus-visible {
      opacity: 0.9;
    }

    .countdown-action-btn.danger {
      color: var(--countdown-danger);
      background: var(--countdown-danger-bg);
    }

    .countdown-value {
      margin: 0;
      font-size: clamp(1.86rem, 5.6vw, 3.42rem);
      line-height: 0.92;
      letter-spacing: -0.02em;
      font-family: var(--font-time);
      font-weight: 760;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1, "lnum" 1;
      text-wrap: nowrap;
      color: var(--ink);
      text-shadow: 0 12px 28px var(--time-shadow);
    }

    .countdown-meta {
      margin: clamp(0.55rem, 1.6vw, 0.82rem) 0 0;
      font-size: clamp(0.78rem, 1.2vw, 0.92rem);
      letter-spacing: 0.02em;
      font-weight: 520;
      color: var(--muted);
      opacity: 0.88;
    }

    .countdown-block.is-warning .countdown-value {
      opacity: 0.76;
    }

    .countdown-block.is-warning .countdown-meta {
      color: var(--countdown-danger);
    }

    @keyframes settle-in {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 720px) {
      :root {
        --left-gap: clamp(1rem, 6vw, 2rem);
        --time-size: clamp(2.4rem, 15vw, 5rem);
      }

      .clock-shell {
        top: 0;
        gap: clamp(1.8rem, 6.5vh, 2.8rem);
        max-width: 95vw;
      }

      .countdown-block {
        max-width: 100%;
      }

      .countdown-display {
        margin: 0 -0.2rem;
        padding: 0.2rem;
      }

      .countdown-controls {
        flex-direction: column;
        align-items: stretch;
      }

      .countdown-field,
      .countdown-field-time {
        min-width: 0;
        flex: 1 1 auto;
      }

      .countdown-actions {
        width: 100%;
      }

      .countdown-action-btn {
        flex: 1 1 0;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="action-bar">
    <button id="fullscreenBtn" class="fullscreen-btn" type="button" aria-pressed="false">Full Screen</button>
  </div>

  <main class="clock-shell" aria-live="polite" aria-label="Current time and countdown">
    <section aria-label="Current time">
      <div class="label">Current Time</div>
      <h1 id="time" class="time">00:00:00</h1>
      <div id="meta" class="meta">Loading...</div>
    </section>

    <section id="countdownArea" class="countdown-area" aria-label="Later today countdown">
      <button id="countdownOpenLink" class="countdown-open-link" type="button">Set Countdown</button>

      <section id="countdownBlock" class="countdown-block" aria-label="Later today countdown" hidden>
        <div class="countdown-label">Later Today</div>

        <div id="countdownDisplay" class="countdown-display" role="button" tabindex="0" aria-label="Edit countdown">
          <p id="countdownValue" class="countdown-value">--:--:--</p>
          <p id="countdownMeta" class="countdown-meta">Set a time later today to start countdown.</p>
        </div>

        <form id="countdownControls" class="countdown-controls" novalidate hidden>
          <label class="countdown-field" for="countdownNameInput">
            <input id="countdownNameInput" type="text" maxlength="48" autocomplete="off" placeholder="Next Event" />
          </label>
          <label class="countdown-field countdown-field-time" for="countdownTimeInput">
            <span class="countdown-field-label">Time</span>
            <input id="countdownTimeInput" type="time" step="60" required />
          </label>
          <div class="countdown-actions">
            <button id="countdownApplyBtn" class="countdown-action-btn primary" type="submit">Apply</button>
            <button id="countdownClearBtn" class="countdown-action-btn danger" type="button">Clear</button>
            <button id="countdownCancelBtn" class="countdown-action-btn" type="button">Close</button>
          </div>
        </form>
      </section>
    </section>
  </main>

  <script>
    const timeEl = document.getElementById("time");
    const metaEl = document.getElementById("meta");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const countdownOpenLinkEl = document.getElementById("countdownOpenLink");
    const countdownBlockEl = document.getElementById("countdownBlock");
    const countdownDisplayEl = document.getElementById("countdownDisplay");
    const countdownControlsEl = document.getElementById("countdownControls");
    const countdownNameInput = document.getElementById("countdownNameInput");
    const countdownTimeInput = document.getElementById("countdownTimeInput");
    const countdownClearBtn = document.getElementById("countdownClearBtn");
    const countdownCancelBtn = document.getElementById("countdownCancelBtn");
    const countdownValueEl = document.getElementById("countdownValue");
    const countdownMetaEl = document.getElementById("countdownMeta");
    const countdownStorageKey = "zen-clock-countdown-v1";
    const clockTimePattern = /^\d{2}:\d{2}$/;

    let countdownState = {
      enabled: false,
      name: "",
      time: ""
    };

    let countdownControlsVisible = false;

    const timeFormatter = new Intl.DateTimeFormat(undefined, {
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
      hour12: false
    });

    const dateFormatter = new Intl.DateTimeFormat(undefined, {
      weekday: "long",
      year: "numeric",
      month: "long",
      day: "numeric"
    });

    const shortTimeFormatter = new Intl.DateTimeFormat(undefined, {
      hour: "2-digit",
      minute: "2-digit",
      hour12: false
    });

    const zoneLabel = Intl.DateTimeFormat().resolvedOptions().timeZone || "Local Time";

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function formatInputTime(date) {
      return `${pad2(date.getHours())}:${pad2(date.getMinutes())}`;
    }

    function getDefaultCountdownTime(now = new Date()) {
      const candidate = new Date(now.getTime() + 75 * 60 * 1000);
      candidate.setSeconds(0, 0);

      const minuteRemainder = candidate.getMinutes() % 5;
      if (minuteRemainder !== 0) {
        candidate.setMinutes(candidate.getMinutes() + (5 - minuteRemainder));
      }

      if (candidate.getDate() !== now.getDate()) {
        candidate.setHours(23, 59, 0, 0);
      }

      return formatInputTime(candidate);
    }

    function parseTodayTarget(timeValue, referenceDate = new Date()) {
      if (!clockTimePattern.test(timeValue)) {
        return null;
      }

      const [hoursText, minutesText] = timeValue.split(":");
      const hours = Number(hoursText);
      const minutes = Number(minutesText);

      if (!Number.isInteger(hours) || !Number.isInteger(minutes)) {
        return null;
      }

      if (hours < 0 || hours > 23 || minutes < 0 || minutes > 59) {
        return null;
      }

      const target = new Date(referenceDate);
      target.setHours(hours, minutes, 0, 0);
      return target;
    }

    function formatCountdownDuration(diffMs) {
      const totalSeconds = Math.max(0, Math.floor(diffMs / 1000));
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      return `${pad2(hours)}:${pad2(minutes)}:${pad2(seconds)}`;
    }

    function setTimeInputMin(now = new Date()) {
      const minTarget = new Date(now.getTime() + 60 * 1000);
      minTarget.setSeconds(0, 0);
      if (minTarget.getDate() !== now.getDate()) {
        countdownTimeInput.removeAttribute("min");
        return;
      }

      countdownTimeInput.min = formatInputTime(minTarget);
    }

    function normalizeCountdownName(value) {
      if (typeof value !== "string") {
        return "";
      }

      return value.trim().slice(0, 48);
    }

    function isValidCountdownTime(value) {
      return typeof value === "string" && clockTimePattern.test(value);
    }

    function setCountdownDraftFromState(now = new Date()) {
      countdownNameInput.value = countdownState.name;
      countdownTimeInput.value = countdownState.enabled && isValidCountdownTime(countdownState.time)
        ? countdownState.time
        : getDefaultCountdownTime(now);
    }

    function syncCountdownLayout() {
      const hasCountdown = countdownState.enabled;
      countdownOpenLinkEl.hidden = hasCountdown || countdownControlsVisible;
      countdownBlockEl.hidden = !hasCountdown && !countdownControlsVisible;
      countdownDisplayEl.hidden = !hasCountdown;
      countdownControlsEl.hidden = !countdownControlsVisible;
      countdownBlockEl.classList.toggle("is-editing", countdownControlsVisible);
    }

    function saveCountdownState() {
      try {
        if (!countdownState.enabled) {
          localStorage.removeItem(countdownStorageKey);
          return;
        }

        localStorage.setItem(countdownStorageKey, JSON.stringify(countdownState));
      } catch (error) {
        console.warn("Unable to save countdown config:", error);
      }
    }

    function loadCountdownConfig(now = new Date()) {
      countdownState = {
        enabled: false,
        name: "",
        time: ""
      };

      setCountdownDraftFromState(now);

      try {
        const raw = localStorage.getItem(countdownStorageKey);
        if (!raw) {
          return;
        }

        const stored = JSON.parse(raw);
        const storedName = normalizeCountdownName(stored?.name);
        const storedTime = isValidCountdownTime(stored?.time) ? stored.time : "";
        const storedEnabled = typeof stored?.enabled === "boolean" ? stored.enabled : Boolean(storedTime);

        if (storedEnabled && storedTime) {
          countdownState = {
            enabled: true,
            name: storedName,
            time: storedTime
          };
        }
      } catch (error) {
        console.warn("Unable to load countdown config:", error);
      } finally {
        setCountdownDraftFromState(now);
      }
    }

    function openCountdownControls(now = new Date()) {
      countdownControlsVisible = true;
      setCountdownDraftFromState(now);
      syncCountdownLayout();
      countdownTimeInput.focus();
    }

    function closeCountdownControls(now = new Date()) {
      countdownControlsVisible = false;
      setCountdownDraftFromState(now);
      syncCountdownLayout();
      paintCountdown(now);
    }

    function applyCountdownFromControls(now = new Date()) {
      const target = parseTodayTarget(countdownTimeInput.value, now);
      if (!target) {
        countdownBlockEl.classList.add("is-warning");
        countdownMetaEl.textContent = "Set a valid time later today.";
        countdownTimeInput.focus();
        return;
      }

      countdownState = {
        enabled: true,
        name: normalizeCountdownName(countdownNameInput.value),
        time: countdownTimeInput.value
      };

      saveCountdownState();
      countdownControlsVisible = false;
      syncCountdownLayout();
      paintCountdown(now);
    }

    function clearCountdown() {
      countdownState = {
        enabled: false,
        name: "",
        time: ""
      };

      countdownControlsVisible = false;
      saveCountdownState();
      setCountdownDraftFromState();
      countdownBlockEl.classList.remove("is-warning");
      syncCountdownLayout();
      paintCountdown();
    }

    function paintCountdown(now = new Date()) {
      countdownBlockEl.classList.remove("is-warning");

      if (!countdownState.enabled) {
        countdownValueEl.textContent = "--:--:--";
        countdownMetaEl.textContent = "Set a countdown later today.";
        return;
      }

      const label = countdownState.name || "Next Event";
      const target = parseTodayTarget(countdownState.time, now);

      if (!target) {
        countdownValueEl.textContent = "--:--:--";
        countdownMetaEl.textContent = "Set a valid time later today.";
        countdownBlockEl.classList.add("is-warning");
        return;
      }

      const diffMs = target.getTime() - now.getTime();

      if (diffMs <= 0) {
        countdownValueEl.textContent = "00:00:00";
        countdownMetaEl.textContent = `${label} reached at ${shortTimeFormatter.format(target)}. Tap countdown to update.`;
        countdownBlockEl.classList.add("is-warning");
        return;
      }

      countdownValueEl.textContent = formatCountdownDuration(diffMs);
      countdownMetaEl.textContent = `${label} · until ${shortTimeFormatter.format(target)} (${zoneLabel})`;
    }

    function hasFullscreenElement() {
      return Boolean(document.fullscreenElement || document.webkitFullscreenElement);
    }

    function syncFullscreenState() {
      const active = hasFullscreenElement();
      document.body.classList.toggle("is-fullscreen", active);
      fullscreenBtn.textContent = active ? "Exit Full Screen" : "Full Screen";
      fullscreenBtn.setAttribute("aria-pressed", String(active));
    }

    async function enterFullscreen() {
      const root = document.documentElement;

      if (root.requestFullscreen) {
        await root.requestFullscreen();
        return;
      }

      if (root.webkitRequestFullscreen) {
        root.webkitRequestFullscreen();
      }
    }

    async function exitFullscreen() {
      if (document.exitFullscreen) {
        await document.exitFullscreen();
        return;
      }

      if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      }
    }

    async function toggleFullscreen() {
      try {
        if (hasFullscreenElement()) {
          await exitFullscreen();
        } else {
          await enterFullscreen();
        }
      } catch (error) {
        console.error("Fullscreen toggle failed:", error);
      } finally {
        syncFullscreenState();
      }
    }

    function paintClock() {
      const now = new Date();
      const shownTime = timeFormatter.format(now);

      timeEl.classList.add("tick");
      timeEl.textContent = shownTime;
      metaEl.textContent = `${dateFormatter.format(now)} · ${zoneLabel}`;
      setTimeInputMin(now);
      paintCountdown(now);
      document.title = `${shownTime} · Zen Clock`;

      window.setTimeout(() => {
        timeEl.classList.remove("tick");
      }, 160);

      const delay = 1000 - now.getMilliseconds();
      window.setTimeout(paintClock, delay);
    }

    fullscreenBtn.addEventListener("click", toggleFullscreen);

    document.addEventListener("fullscreenchange", syncFullscreenState);
    document.addEventListener("webkitfullscreenchange", syncFullscreenState);

    document.addEventListener("keydown", (event) => {
      if (event.key.toLowerCase() !== "f" || event.ctrlKey || event.metaKey || event.altKey) {
        return;
      }

      event.preventDefault();
      toggleFullscreen();
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch((error) => {
          console.error("Service worker registration failed:", error);
        });
      });
    }

    loadCountdownConfig();
    setTimeInputMin();
    paintCountdown();
    syncCountdownLayout();

    countdownOpenLinkEl.addEventListener("click", () => {
      openCountdownControls(new Date());
    });

    countdownDisplayEl.addEventListener("click", () => {
      if (countdownState.enabled && !countdownControlsVisible) {
        openCountdownControls(new Date());
      }
    });

    countdownDisplayEl.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") {
        return;
      }

      event.preventDefault();
      if (countdownState.enabled && !countdownControlsVisible) {
        openCountdownControls(new Date());
      }
    });

    countdownControlsEl.addEventListener("submit", (event) => {
      event.preventDefault();
      applyCountdownFromControls(new Date());
    });

    countdownClearBtn.addEventListener("click", () => {
      clearCountdown();
    });

    countdownCancelBtn.addEventListener("click", () => {
      closeCountdownControls(new Date());
    });

    syncFullscreenState();
    paintClock();
  </script>
</body>
</html>
